<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Hand Tracking AR</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<style>
body { margin:0; overflow:hidden; background:#000; }
canvas, video { position:absolute; width:100%; height:100%; }
video { transform:scaleX(-1); }
canvas { transform:scaleX(-1); }
</style>
</head>

<body>

<video class="input_video" autoplay playsinline></video>
<canvas id="bg"></canvas>
<canvas id="main"></canvas>

<script>
const video = document.querySelector("video");
const bg = document.getElementById("bg");
const main = document.getElementById("main");
const bgCtx = bg.getContext("2d");
const ctx = main.getContext("2d");

let w, h;
function resize(){
w = innerWidth; h = innerHeight;
bg.width = main.width = w;
bg.height = main.height = h;
}
resize();
addEventListener("resize", resize);

let handsData = [];
let lastPinch = [false,false];

let drawing = false;
let points = [];
let mode = "normal";

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}

function map(p){ return {x:p.x*w, y:p.y*h}; }

function drawWatermark(){
ctx.save();
ctx.globalAlpha = 0.4;
ctx.font = "20px monospace";
ctx.fillStyle = "#00ffff";
ctx.fillText("@sudipchdadi",20,h-30);
ctx.restore();
}

function drawPortal(a,b){
let cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
let r=dist(a,b)*200;

ctx.beginPath();
ctx.arc(cx,cy,r,0,Math.PI*2);

let g=ctx.createRadialGradient(cx,cy,10,cx,cy,r);
g.addColorStop(0,"rgba(0,255,255,0.8)");
g.addColorStop(0.5,"rgba(255,0,255,0.3)");
g.addColorStop(1,"transparent");

ctx.fillStyle=g;
ctx.fill();
}

function updateGesture(){
if(!handsData.length) return;

handsData.forEach((h,i)=>{
let t=h[4], idx=h[8];
let d=dist(t,idx);
let pinch=d<0.05;

if(pinch && !lastPinch[i]){
drawing=!drawing;
mode = drawing ? "draw" : "normal";
}

lastPinch[i]=pinch;
});

if(handsData[0]){
let spread = dist(handsData[0][8],handsData[0][20]);

if(spread>0.25) mode="portal";
else if(!drawing) mode="normal";
}
}

function draw(){
requestAnimationFrame(draw);

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,w,h);

updateGesture();

if(handsData.length){

let h = handsData[0];

// ✍️ DRAW MODE
if(mode==="draw"){
let p = map(h[8]);
points.push(p);

ctx.beginPath();
for(let i=1;i<points.length;i++){
ctx.moveTo(points[i-1].x,points[i-1].y);
ctx.lineTo(points[i].x,points[i].y);
}
ctx.strokeStyle="cyan";
ctx.lineWidth=3;
ctx.shadowBlur=10;
ctx.shadowColor="cyan";
ctx.stroke();
}

// 🌀 PORTAL MODE
if(mode==="portal" && handsData.length>1){
drawPortal(map(handsData[0][8]), map(handsData[1][8]));
}

// skeleton
handsData.forEach(h=>{
h.forEach(p=>{
let pt=map(p);
ctx.beginPath();
ctx.arc(pt.x,pt.y,3,0,Math.PI*2);
ctx.fillStyle="#fff";
ctx.fill();
});
});
}

drawWatermark();
}

const hands = new Hands({
locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
maxNumHands:2,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(res=>{
handsData = res.multiHandLandmarks || [];
});

const cam = new Camera(video,{
onFrame: async ()=>{
await hands.send({image:video});
},
width:1280,
height:720
});
cam.start();

draw();
</script>

</body>
</html>
