<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Hand Tracking v3</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

/* ===== BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cyan:#00f5ff;--pink:#ff00aa;--green:#00ff88;--orange:#ff6600;--purple:#aa00ff;
  --bg:#000008;--panel:rgba(0,8,24,0.82);--border:rgba(0,245,255,0.22);
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--cyan)}
#app{position:relative;width:100vw;height:100vh}

/* ===== CANVAS LAYERS ===== */
#starfield,#matrix{position:fixed;inset:0;pointer-events:none}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);filter:brightness(1.3) contrast(1.15);z-index:2}
#canvas,#paint-canvas{position:absolute;inset:0;width:100%;height:100%}

/* ===== HUD ===== */
#hud{position:fixed;inset:0;pointer-events:none;z-index:5}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 4s linear infinite;opacity:.25}
@keyframes scan{0%{top:0}100%{top:100%}}

/* ===== STATUS ===== */
#status-panel{position:fixed;top:16px;left:16px;z-index:7;background:var(--panel);border:1px solid var(--border);padding:10px 14px;font-size:11px}

/* ===== FPS ===== */
#fps-box{position:fixed;top:16px;right:16px;z-index:7}
#fps-num{font-size:24px;color:var(--green)}

/* ===== GESTURE ===== */
#gesture-display{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:7;opacity:0}
#gesture-display.show{opacity:1}

/* ===== LOADER ===== */
#loader{position:fixed;inset:0;background:#000;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center}
#loader.hidden{opacity:0;pointer-events:none}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div style="font-family:Orbitron;color:var(--cyan)">LOADING AR SYSTEM</div>
</div>

<div id="app">
  <canvas id="starfield"></canvas>
  <canvas id="matrix"></canvas>

  <video id="video" autoplay playsinline muted></video>

  <canvas id="canvas"></canvas>
  <canvas id="paint-canvas"></canvas>

  <div id="hud">
    <div class="scan-line"></div>
  </div>

  <div id="gesture-display"></div>
</div>

<script>
/* ===================== STATE ===================== */
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const paint=document.getElementById("paint-canvas");
const pctx=paint.getContext("2d");

const star=document.getElementById("starfield");
const sctx=star.getContext("2d");

const matrix=document.getElementById("matrix");
const mctx=matrix.getContext("2d");

let hands=[];

/* ===================== RESIZE FIX ===================== */
function resize(){
  [canvas,paint,star,matrix].forEach(c=>{
    c.width=innerWidth;
    c.height=innerHeight;
  });
}
addEventListener("resize",resize);
resize();

/* ===================== STARS ===================== */
let stars=[];
function initStars(){
  stars=Array.from({length:120},()=>({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*1.5
  }));
}
initStars();

function drawStars(){
  sctx.clearRect(0,0,innerWidth,innerHeight);
  for(const s of stars){
    sctx.beginPath();
    sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sctx.fillStyle="white";
    sctx.fill();
  }
}

/* ===================== MATRIX FIX (resize-safe) ===================== */
let drops=[];
function initMatrix(){
  const cols=Math.floor(innerWidth/16);
  drops=Array(cols).fill(1);
}
initMatrix();

function drawMatrix(){
  mctx.fillStyle="rgba(0,0,0,0.08)";
  mctx.fillRect(0,0,innerWidth,innerHeight);

  mctx.fillStyle="#0f0";
  mctx.font="14px monospace";

  for(let i=0;i<drops.length;i++){
    const text=String.fromCharCode(0x30A0+Math.random()*96);
    mctx.fillText(text,i*16,drops[i]*16);

    if(drops[i]*16>innerHeight && Math.random()>0.975){
      drops[i]=0;
    }
    drops[i]++;
  }
}

/* ===================== DRAW HANDS ===================== */
function drawHands(){
  ctx.clearRect(0,0,innerWidth,innerHeight);

  for(const h of hands){
    for(const lm of h){
      const x=(1-lm.x)*innerWidth;
      const y=lm.y*innerHeight;

      ctx.beginPath();
      ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle="#00f5ff";
      ctx.fill();
    }
  }
}

/* ===================== LOOP ===================== */
function loop(){
  requestAnimationFrame(loop);
  drawStars();
  drawMatrix();
  drawHands();
}
loop();

/* ===================== CAMERA ===================== */
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"user"}
    });
    video.srcObject=stream;
  }catch(e){
    alert("Camera blocked");
  }
}

/* ===================== MEDIAPIPE ===================== */
async function load(){
  await startCamera();

  const script=document.createElement("script");
  script.src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js";
  script.onload=async()=>{

    const handsModel=new Hands({
      locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    handsModel.setOptions({
      maxNumHands:2,
      minDetectionConfidence:0.7,
      minTrackingConfidence:0.7
    });

    handsModel.onResults(res=>{
      hands=[];
      if(res.multiHandLandmarks){
        hands=res.multiHandLandmarks;
      }
    });

    const camScript=document.createElement("script");
    camScript.src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";
    camScript.onload=()=>{
      const cam=new Camera(video,{
        onFrame:async()=>{
          await handsModel.send({image:video});
        },
        width:1280,
        height:720
      });
      cam.start();

      document.getElementById("loader").classList.add("hidden");
    };
    document.body.appendChild(camScript);
  };

  document.body.appendChild(script);
}

load();
</script>

</body>
</html>
