<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Hand Tracking - @sudipchdadi</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
video, canvas {
position:absolute;
width:100%;
height:100%;
transform:scaleX(-1);
}
</style>
</head>

<body>

<video class="input_video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.querySelector("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;
function resize(){
w = innerWidth; h = innerHeight;
canvas.width = w;
canvas.height = h;
}
resize();
addEventListener("resize", resize);

let handsData = [];
let drawing = false;
let points = [];
let mode = "normal";
let lastPinch = [false,false];

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}

function map(p){
return {x:p.x*w,y:p.y*h};
}

function drawWatermark(){
ctx.save();
ctx.fillStyle = "cyan";
ctx.globalAlpha = 0.5;
ctx.font = "18px monospace";
ctx.fillText("@sudipchdadi",20,h-20);
ctx.restore();
}

function drawPortal(a,b){
let cx=(a.x+b.x)/2;
let cy=(a.y+b.y)/2;
let r=dist(a,b)*200;

ctx.beginPath();
ctx.arc(cx,cy,r,0,Math.PI*2);

let g=ctx.createRadialGradient(cx,cy,10,cx,cy,r);
g.addColorStop(0,"rgba(0,255,255,0.8)");
g.addColorStop(1,"transparent");

ctx.fillStyle=g;
ctx.fill();
}

function updateGesture(){
if(!handsData.length) return;

handsData.forEach((h,i)=>{
let d=dist(h[4],h[8]);
let pinch=d<0.05;

if(pinch && !lastPinch[i]){
drawing=!drawing;
mode = drawing ? "draw" : "normal";
}
lastPinch[i]=pinch;
});

if(handsData[0]){
let spread=dist(handsData[0][8],handsData[0][20]);
if(spread>0.25) mode="portal";
else if(!drawing) mode="normal";
}
}

function render(){
requestAnimationFrame(render);

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,w,h);

updateGesture();

if(handsData.length){

let h = handsData[0];

// ✍️ DRAW MODE
if(mode==="draw"){
let p = map(h[8]);
points.push(p);

ctx.beginPath();
for(let i=1;i<points.length;i++){
ctx.moveTo(points[i-1].x,points[i-1].y);
ctx.lineTo(points[i].x,points[i].y);
}
ctx.strokeStyle="cyan";
ctx.lineWidth=3;
ctx.shadowBlur=10;
ctx.shadowColor="cyan";
ctx.stroke();
}

// 🌀 PORTAL MODE
if(mode==="portal" && handsData.length>1){
drawPortal(map(handsData[0][8]), map(handsData[1][8]));
}

// hand dots
handsData.forEach(h=>{
h.forEach(p=>{
let pt=map(p);
ctx.beginPath();
ctx.arc(pt.x,pt.y,3,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
});
});
}

drawWatermark();
}

const hands = new Hands({
locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
maxNumHands:2,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(res=>{
handsData = res.multiHandLandmarks || [];
});

const camera = new Camera(video,{
onFrame: async ()=>{
await hands.send({image:video});
},
width:1280,
height:720
});

camera.start();
render();
</script>

</body>
</html>
