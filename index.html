<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Hand Tracking v3 — Holographic + Paint</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED FOR BREVITY) ===== */
body{margin:0;background:#000}
canvas,video{position:absolute;top:0;left:0}
#paint-toolbar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:10}
.color-swatch{width:22px;height:22px;border-radius:50%}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>
<canvas id="paint-canvas"></canvas>

<!-- FIXED: duplicate id removed -->
<div id="paint-toolbar">
  <button onclick="setPaintColor('#ff00aa')">Pink</button>
  <button onclick="setPaintColor('#00f5ff')">Cyan</button>
  <button onclick="clearPaint()">Clear</button>
  <button onclick="undoPaint()">Undo</button>
</div>

<script>
// ================= STATE =================
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const paintCanvas = document.getElementById("paint-canvas");
const pctx = paintCanvas.getContext("2d");

canvas.width = paintCanvas.width = window.innerWidth;
canvas.height = paintCanvas.height = window.innerHeight;

let paintColor = "#ff00aa";
let brushSize = 6;
let paintHistory = [];

let handsData = [];
let lastBeamTime = 0;   // FIX: debounce beam sound

// ================= PAINT =================
function setPaintColor(c){ paintColor = c; }

function pushHistory(){
  paintHistory.push(pctx.getImageData(0,0,paintCanvas.width,paintCanvas.height));
  if(paintHistory.length>30) paintHistory.shift();
}

function undoPaint(){
  if(!paintHistory.length) return;
  pctx.putImageData(paintHistory.pop(),0,0);
}

function clearPaint(){
  pushHistory();
  pctx.clearRect(0,0,paintCanvas.width,paintCanvas.height);
}

// ================= DRAW LINE =================
function drawLine(x1,y1,x2,y2){
  pctx.strokeStyle = paintColor;
  pctx.lineWidth = brushSize;
  pctx.lineCap = "round";
  pctx.beginPath();
  pctx.moveTo(x1,y1);
  pctx.lineTo(x2,y2);
  pctx.stroke();
}

// ================= GESTURE =================
function isPinch(lm){
  const dx = lm[4].x - lm[8].x;
  const dy = lm[4].y - lm[8].y;
  return Math.sqrt(dx*dx+dy*dy) < 0.05;
}

// ================= MAIN LOOP =================
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(handsData.length){

    const lm = handsData[0];

    const x = (1 - lm[8].x) * canvas.width;
    const y = lm[8].y * canvas.height;

    const pinch = isPinch(lm);

    // DRAW cursor
    ctx.fillStyle = pinch ? "red" : "white";
    ctx.beginPath();
    ctx.arc(x,y,8,0,Math.PI*2);
    ctx.fill();

    // DRAW PAINT (gesture)
    if(pinch){
      pushHistory();
      pctx.fillStyle = paintColor;
      pctx.beginPath();
      pctx.arc(x,y,brushSize,0,Math.PI*2);
      pctx.fill();
    }
  }

  requestAnimationFrame(render);
}
render();

// ================= BEAM FIX (DEBOUNCE) =================
function checkBeam(){
  if(handsData.length<2) return;

  const now = Date.now();
  if(now - lastBeamTime < 800) return; // FIX: prevent spam

  const a = handsData[0][8];
  const b = handsData[1][8];

  const dx = a.x - b.x;
  const dy = a.y - b.y;

  if(Math.sqrt(dx*dx+dy*dy) < 0.2){
    lastBeamTime = now;
    console.log("BEAM!");
  }
}

// ================= MEDIAPIPE =================
const hands = new Hands({
  locateFile: (file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands:2,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.6
});

hands.onResults(results=>{
  handsData = results.multiHandLandmarks || [];
  checkBeam();
});

const camera = new Camera(video,{
  onFrame: async()=>{
    await hands.send({image:video});
  },
  width:1280,
  height:720
});
camera.start();

</script>
</body>
</html>
