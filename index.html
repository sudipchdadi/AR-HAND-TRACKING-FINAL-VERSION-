<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hands AR Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
filter:brightness(1.6) contrast(1.2) saturate(1.3);
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
transform:scaleX(-1);
}

#watermark{
position:absolute;
bottom:10px;
right:15px;
color:white;
opacity:0.7;
font-size:14px;
z-index:10;
}
</style>
</head>

<body>

<video class="input_video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="watermark">@sudipchdadi</div>

<script>
const video = document.querySelector(".input_video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);

function draw(results){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(!results.multiHandLandmarks) return;

for(const hand of results.multiHandLandmarks){

// draw lines
drawConnectors(ctx, hand, HAND_CONNECTIONS,{
color:"#00ffe5",
lineWidth:2
});

// draw points
for(let i=0;i<hand.length;i++){
const x = hand[i].x * canvas.width;
const y = hand[i].y * canvas.height;

ctx.beginPath();
ctx.arc(x,y,4,0,Math.PI*2);
ctx.fillStyle="#ffffff";
ctx.shadowBlur=10;
ctx.shadowColor="#00ffe5";
ctx.fill();
ctx.shadowBlur=0;
}
}
}

const hands = new Hands({
locateFile:(file)=>
`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
maxNumHands:2,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(draw);

const camera = new Camera(video,{
onFrame: async ()=>{
await hands.send({image:video});
},
width:1280,
height:720
});

camera.start();
</script>

</body>
</html>
